version: 2

builds:
  - main: ./cmd/peppol/
    binary: peppol
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/e-invoicebe/peppol-cli/internal/version.Version={{.Version}}
      - -X github.com/e-invoicebe/peppol-cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/e-invoicebe/peppol-cli/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: e-invoice-be
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/e-invoice-be/peppol-cli"
    description: "CLI for the e-invoice.be Peppol Access Point API"
    license: "MIT"
    test: |
      system "#{bin}/peppol", "version"
    install: |
      bin.install "peppol"
